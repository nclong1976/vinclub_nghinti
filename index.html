<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinclub Clone</title>
    <script>
      try {
        let originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return originalFetch;
          },
          set(val) {
            originalFetch = val;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.error("Could not patch fetch:", e);
      }
    </script>
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
